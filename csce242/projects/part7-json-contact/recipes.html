<!DOCTYPE html>
<html>
    <head>
        <title>Sean's Recipes</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body>
        <header>
            <nav id="topnav">
                <img src="images/logo.png" alt="Sean's Recipes Logo">

                <div id="hamburger-toggle">
                    <section></section>
                    <section></section>
                    <section></section>
                </div>

                <ul id="topnav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="recipes.html" class="active">Recipes</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>

                <a href="tomato-sauce-pasta.html"><button class="action-button">Random Recipe</button></a>
            </nav>
        </header>

        <main id="recipes-page">
            <h1>Browse All Recipes</h1>

            <div id="recipes-filter-buttons">
                <button class="action-button">All</button>
                <button class="action-button inactive-button">Beginner</button>
                <button class="action-button inactive-button">Budget</button>
                <button class="action-button inactive-button">Quick</button>
            </div>

            <!-- Recipes-list is now populated through JS and JSON -->
            <div id="recipes-list"></div>

            <div id="recipes-page-selector">
                <h4>Showing page 1 of 2</h4>
                <div id="page-number-buttons">
                    <button class="action-button">1</button>
                    <button class="action-button inactive-button">2</button>
                </div>
            </div>

            <div id="recipes-cant-find">
                <h2>Can't find what you want?</h2>
                <div id="gallery-or-sort">
                    <div id="gallery-or-choice-one">
                        <h4>Take a look at the picture gallery</h4>
                        <a href="gallery.html"><button class="action-button">See Completed Dishes</button></a>
                    </div>

                    <div id="gallery-or-choice-two">
                        <h4>OR</h4>
                        <h4>Try sorting by category!</h4>
                    </div>
                </div>
            </div>
        </main>
    </body>
    <script src="js/script.js"></script>
    <script src="js/recipes.js"></script>
</html>
